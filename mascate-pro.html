<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mascate Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --laranja: #E8611A;
    --laranja2: #ff7a35;
    --dark: #1a1a1a;
    --card: #242424;
    --card2: #2e2e2e;
    --border: #3a3a3a;
    --verde: #22c55e;
    --vermelho: #ef4444;
    --amarelo: #f59e0b;
    --muted: #888888;
    --text: #f0f0f0;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--dark); color:var(--text); font-family:'Nunito',sans-serif; overflow-x:hidden; }

  /* ─── SPLASH ─── */
  #splash {
    position:fixed; inset:0; background:var(--dark);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; transition:opacity .5s;
  }
  #splash .logo-big { font-family:'Bebas Neue',sans-serif; font-size:64px; color:var(--laranja); letter-spacing:4px; line-height:1; }
  #splash .logo-sub { font-size:13px; color:var(--muted); letter-spacing:6px; text-transform:uppercase; margin-top:4px; }
  #splash .loader { width:40px; height:3px; background:var(--border); border-radius:2px; margin-top:40px; overflow:hidden; }
  #splash .loader-bar { height:100%; width:0; background:var(--laranja); border-radius:2px; animation:load 1.8s ease forwards; }
  @keyframes load { to { width:100%; } }

  /* ─── AUTH ─── */
  #auth-screen {
    display:none; min-height:100vh;
    flex-direction:column; align-items:center; justify-content:center; padding:24px;
  }
  .auth-logo { font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--laranja); letter-spacing:3px; margin-bottom:4px; text-align:center; }
  .auth-sub { font-size:12px; color:var(--muted); letter-spacing:4px; text-transform:uppercase; text-align:center; margin-bottom:32px; }
  .auth-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; width:100%; max-width:400px; }
  .auth-tabs { display:flex; gap:0; margin-bottom:24px; background:var(--dark); border-radius:10px; padding:3px; }
  .auth-tab { flex:1; padding:10px; text-align:center; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; color:var(--muted); transition:.2s; border:none; background:transparent; font-family:'Nunito',sans-serif; }
  .auth-tab.active { background:var(--laranja); color:#fff; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .field input, .field select {
    width:100%; padding:12px 14px; background:var(--dark); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:15px; font-family:'Nunito',sans-serif;
    outline:none; transition:.2s;
  }
  .field input:focus, .field select:focus { border-color:var(--laranja); }
  .field select option { background:var(--dark); }
  .btn-primary {
    width:100%; padding:14px; background:var(--laranja); color:#fff; border:none;
    border-radius:10px; font-size:16px; font-weight:800; font-family:'Nunito',sans-serif;
    cursor:pointer; transition:.2s; letter-spacing:.5px;
  }
  .btn-primary:active { transform:scale(.98); opacity:.9; }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .auth-error { color:var(--vermelho); font-size:13px; text-align:center; margin-top:12px; display:none; }
  .auth-divider { text-align:center; color:var(--muted); font-size:12px; margin:16px 0; }

  /* ─── WIZARD ─── */
  #wizard-screen { display:none; min-height:100vh; flex-direction:column; padding:0; }
  .wizard-header { padding:20px 20px 0; display:flex; align-items:center; gap:12px; }
  .wizard-header .logo-sm { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--laranja); letter-spacing:2px; }
  .wizard-steps { display:flex; gap:6px; flex:1; justify-content:flex-end; }
  .wstep { width:28px; height:4px; border-radius:2px; background:var(--border); transition:.3s; }
  .wstep.active { background:var(--laranja); }
  .wstep.done { background:var(--verde); }
  .wizard-body { flex:1; padding:24px 20px; overflow-y:auto; }
  .wizard-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--text); letter-spacing:2px; margin-bottom:4px; }
  .wizard-desc { font-size:14px; color:var(--muted); margin-bottom:24px; line-height:1.5; }

  /* tipo cards */
  .tipo-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .tipo-card {
    background:var(--card); border:2px solid var(--border); border-radius:14px;
    padding:16px 12px; cursor:pointer; transition:.2s; text-align:center;
  }
  .tipo-card.selected { border-color:var(--laranja); background:#E8611A15; }
  .tipo-card .tipo-icon { font-size:28px; margin-bottom:8px; }
  .tipo-card .tipo-nome { font-size:13px; font-weight:800; color:var(--text); margin-bottom:4px; }
  .tipo-card .tipo-desc { font-size:11px; color:var(--muted); line-height:1.4; }
  .tipo-card-full {
    background:var(--card); border:2px solid var(--border); border-radius:14px;
    padding:16px; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:14px;
    margin-bottom:10px;
  }
  .tipo-card-full.selected { border-color:var(--laranja); background:#E8611A15; }
  .tipo-card-full .tipo-icon { font-size:28px; }
  .tipo-card-full .tipo-info .tipo-nome { font-size:14px; font-weight:800; color:var(--text); margin-bottom:3px; }
  .tipo-card-full .tipo-info .tipo-desc { font-size:12px; color:var(--muted); line-height:1.4; }

  /* list items wizard */
  .list-item {
    background:var(--card2); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .list-item .li-name { font-size:14px; font-weight:700; }
  .list-item .li-sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .li-del { background:none; border:none; color:var(--vermelho); font-size:18px; cursor:pointer; padding:4px 8px; }
  .btn-add {
    width:100%; padding:12px; background:transparent; border:1px dashed var(--border);
    border-radius:10px; color:var(--laranja); font-size:14px; font-weight:700;
    font-family:'Nunito',sans-serif; cursor:pointer; transition:.2s; margin-bottom:16px;
  }
  .btn-add:active { background:var(--card); }
  .wizard-footer { padding:16px 20px 32px; display:flex; gap:10px; }
  .btn-back {
    padding:14px 20px; background:transparent; border:1px solid var(--border);
    border-radius:10px; color:var(--muted); font-size:15px; font-weight:700;
    font-family:'Nunito',sans-serif; cursor:pointer; transition:.2s;
  }
  .btn-next {
    flex:1; padding:14px; background:var(--laranja); color:#fff; border:none;
    border-radius:10px; font-size:16px; font-weight:800; font-family:'Nunito',sans-serif;
    cursor:pointer; transition:.2s;
  }
  .btn-next:active { transform:scale(.98); }
  .btn-next:disabled { opacity:.5; }

  /* modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px 40px;
    width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
  }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--text); letter-spacing:2px; margin-bottom:16px; }

  /* ─── APP (dashboard pós-login) ─── */
  #app-screen { display:none; min-height:100vh; flex-direction:column; }
  .app-header {
    background:var(--card); border-bottom:1px solid var(--border);
    padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10;
  }
  .app-header .logo { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--laranja); letter-spacing:2px; }
  .app-header .user-info { text-align:right; }
  .app-header .user-name { font-size:13px; font-weight:700; }
  .app-header .user-role { font-size:11px; color:var(--muted); }
  .app-body { flex:1; padding:20px; }
  .welcome-card {
    background:linear-gradient(135deg,#E8611A20,#E8611A05);
    border:1px solid #E8611A40; border-radius:16px; padding:20px; margin-bottom:20px;
  }
  .welcome-title { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--laranja); letter-spacing:2px; }
  .welcome-sub { font-size:13px; color:var(--muted); margin-top:4px; }
  .role-badge {
    display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:800;
    text-transform:uppercase; letter-spacing:1px; margin-top:10px;
  }
  .role-superadmin { background:#9333ea20; color:#c084fc; border:1px solid #9333ea40; }
  .role-investidor { background:#E8611A20; color:var(--laranja); border:1px solid #E8611A40; }
  .role-operador { background:#22c55e20; color:var(--verde); border:1px solid #22c55e40; }
  .role-vendedor { background:#f59e0b20; color:var(--amarelo); border:1px solid #f59e0b40; }
  .role-socioVisualizador { background:#3b82f620; color:#60a5fa; border:1px solid #3b82f640; }

  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .info-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .info-card .ic-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .info-card .ic-value { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--text); letter-spacing:1px; }
  .info-card .ic-sub { font-size:11px; color:var(--muted); margin-top:2px; }

  .section-title { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text); letter-spacing:2px; margin-bottom:12px; }
  .action-list { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .action-item {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:.15s;
  }
  .action-item:active { background:var(--card2); }
  .action-item .ai-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .action-item .ai-text .ai-title { font-size:14px; font-weight:700; }
  .action-item .ai-text .ai-sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .action-item .ai-arrow { margin-left:auto; color:var(--muted); font-size:18px; }

  .btn-logout {
    width:100%; padding:14px; background:transparent; border:1px solid var(--border);
    border-radius:10px; color:var(--muted); font-size:14px; font-weight:700;
    font-family:'Nunito',sans-serif; cursor:pointer; transition:.2s; margin-top:8px;
  }
  .btn-logout:active { border-color:var(--vermelho); color:var(--vermelho); }

  /* utils */
  .tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .tag-trial { background:#f59e0b20; color:var(--amarelo); border:1px solid #f59e0b40; }
  .spinner { width:20px; height:20px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hidden { display:none !important; }
  .flex { display:flex; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }

  /* superadmin */
  .sa-stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
  .sa-stat .ss-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .sa-stat .ss-value { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--laranja); letter-spacing:2px; }
  .empresa-item { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:8px; }
  .empresa-item .ei-nome { font-size:14px; font-weight:800; margin-bottom:4px; }
  .empresa-item .ei-info { font-size:12px; color:var(--muted); }
  .btn-sm {
    padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700;
    font-family:'Nunito',sans-serif; cursor:pointer; border:none; transition:.2s;
  }
  .btn-block { background:#ef444420; color:var(--vermelho); border:1px solid #ef444440; }
  .btn-unblock { background:#22c55e20; color:var(--verde); border:1px solid #22c55e40; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo-big">MASCATE</div>
  <div class="logo-sub">Pro</div>
  <div class="loader"><div class="loader-bar"></div></div>
</div>

<!-- AUTH -->
<div id="auth-screen" style="display:none;flex-direction:column;">
  <div class="auth-logo">MASCATE</div>
  <div class="auth-sub">Pro · Gestão de Viagens</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="window.switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="window.switchTab('cadastro')">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="window.fazerLogin()" id="btn-login">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="tab-cadastro" class="hidden">
      <div class="field">
        <label>Seu nome</label>
        <input type="text" id="cad-nome" placeholder="João Silva">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="cad-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="window.fazerCadastro()" id="btn-cad">Criar conta grátis</button>
      <div class="auth-divider">Trial de 14 dias · Sem cartão</div>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- WIZARD -->
<div id="wizard-screen" style="display:none;flex-direction:column;">
  <div class="wizard-header">
    <div class="logo-sm">MASCATE</div>
    <div class="wizard-steps">
      <div class="wstep active" id="ws1"></div>
      <div class="wstep" id="ws2"></div>
      <div class="wstep" id="ws3"></div>
      <div class="wstep" id="ws4"></div>
      <div class="wstep" id="ws5"></div>
    </div>
  </div>
  <div class="wizard-body" id="wizard-body"></div>
  <div class="wizard-footer" id="wizard-footer"></div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none;flex-direction:column;">
  <div class="app-header">
    <div class="logo">MASCATE PRO</div>
    <div class="user-info">
      <div class="user-name" id="app-user-name">—</div>
      <div class="user-role" id="app-user-role">—</div>
    </div>
  </div>
  <div class="app-body" id="app-body"></div>
</div>

<!-- MODAL GENÉRICO -->
<div class="modal-overlay" id="modal-overlay" onclick="window.closeModal(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

const firebaseConfig = {
  apiKey: "AIzaSyDuIN0zoRr8nNLnVe9XMjIm7O6_DnV0jLE",
  authDomain: "mascate-pro.firebaseapp.com",
  databaseURL: "https://mascate-pro-default-rtdb.firebaseio.com",
  projectId: "mascate-pro",
  storageBucket: "mascate-pro.firebasestorage.app",
  messagingSenderId: "724919736055",
  appId: "1:724919736055:web:476a1683e173b72762a5f2"
};

const app = initializeApp(firebaseConfig);
// App Check com reCAPTCHA v3
const appCheck = initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LcsYqosAAAAAAxc9Pz3geO_WeEHeKD-WeJJAiWf'),
  isTokenAutoRefreshEnabled: true
});

const auth = getAuth(app);
const db = getDatabase(app);

// ─── ESTADO GLOBAL ───
let currentUser = null;
let currentEmpresa = null;
let wizardData = {
  step: 1,
  tipo: null,        // operador_vendedores | operador_solo | investidor
  nomeEmpresa: '',
  vendedores: [],
  socios: [],
  rotas: [],
  fornecedores: [],
  categorias: ['Hotel','Gasolina','Diesel','Alimentação','Outros']
};

// ─── SPLASH ───
setTimeout(() => {
  document.getElementById('splash').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
  }, 500);
}, 2000);

// ─── AUTH STATE ───
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const snap = await get(ref(db, `usuarios/${user.uid}`));
    if (!snap.exists()) {
      // novo usuário — vai pro wizard
      showScreen('wizard');
      startWizard();
    } else {
      const dados = snap.val();
      // sem role = vai pro wizard
      if (!dados.role) {
        showScreen('wizard');
        startWizard();
        return;
      }
      // usa nome ou nomeTemp
      if (!dados.nome && dados.nomeTemp) dados.nome = dados.nomeTemp;
      // carrega empresa
      if (dados.empresaId) {
        const empSnap = await get(ref(db, `empresas/${dados.empresaId}/config`));
        if (empSnap.exists()) currentEmpresa = { id: dados.empresaId, ...empSnap.val() };
      }
      // verifica assinatura (superadmin nunca bloqueia)
      if (dados.role !== 'superadmin' && dados.empresaId) {
        const assSnap = await get(ref(db, `assinaturas/${dados.empresaId}`));
        if (assSnap.exists()) {
          const ass = assSnap.val();
          const agora = Date.now();
          // bloqueado manualmente
          if (ass.status === 'bloqueada' || ass.status === 'cancelada') {
            showScreen('app');
            document.getElementById('app-body').innerHTML = `
              <div style="padding:40px 20px;text-align:center">
                <div style="font-size:48px;margin-bottom:16px">🔒</div>
                <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--vermelho);letter-spacing:2px;margin-bottom:8px">ACESSO BLOQUEADO</div>
                <div style="font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6">Sua conta foi bloqueada.<br>Entre em contato com o suporte.</div>
                <button class="btn-logout" onclick="window.fazerLogout()" style="max-width:300px;margin:0 auto">Sair</button>
              </div>`;
            document.getElementById('app-user-name').textContent = dados.nome || 'Usuário';
            document.getElementById('app-user-role').textContent = 'Bloqueado';
            return;
          }
          // trial vencido
          if (ass.status === 'trial' && ass.dataVencimento && agora > ass.dataVencimento) {
            showScreen('app');
            document.getElementById('app-body').innerHTML = `
              <div style="padding:40px 20px;text-align:center">
                <div style="font-size:48px;margin-bottom:16px">⏰</div>
                <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amarelo);letter-spacing:2px;margin-bottom:8px">TRIAL VENCIDO</div>
                <div style="font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6">Seu período de teste de 14 dias encerrou.<br>Assine um plano para continuar.</div>
                <button style="width:100%;max-width:300px;padding:14px;background:var(--laranja);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;font-family:Nunito,sans-serif;cursor:pointer;margin-bottom:10px" onclick="alert('Em breve: página de planos!')">Ver Planos</button>
                <br>
                <button class="btn-logout" onclick="window.fazerLogout()" style="max-width:300px;margin:8px auto 0">Sair</button>
              </div>`;
            document.getElementById('app-user-name').textContent = dados.nome || 'Usuário';
            document.getElementById('app-user-role').textContent = 'Trial vencido';
            return;
          }
        }
      }
      showScreen('app');
      renderApp(dados);
    }
  } else {
    currentUser = null;
    currentEmpresa = null;
    showScreen('auth');
  }
});

// ─── UTILS ───
function showScreen(name) {
  ['splash','auth','wizard','app'].forEach(s => {
    const el = document.getElementById(s+'-screen');
    if (el) el.style.display = 'none';
  });
  const target = document.getElementById(name+'-screen');
  if (target) target.style.display = 'flex';
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function setLoading(btnId, loading, txt='') {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>Aguarde...` : txt || btn.dataset.txt || btn.textContent;
  if (!loading && txt) btn.dataset.txt = '';
}

function gerarId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2,5);
}

// ─── AUTH FUNCTIONS ───
window.switchTab = function(tab) {
  document.getElementById('auth-error').style.display = 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='cadastro'));
  });
  document.getElementById('tab-login').classList.toggle('hidden', tab!=='login');
  document.getElementById('tab-cadastro').classList.toggle('hidden', tab!=='cadastro');
};

window.fazerLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  if (!email || !senha) return showError('Preencha e-mail e senha.');
  setLoading('btn-login', true);
  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch(e) {
    setLoading('btn-login', false, 'Entrar');
    const msgs = { 'auth/user-not-found':'Usuário não encontrado.', 'auth/wrong-password':'Senha incorreta.', 'auth/invalid-email':'E-mail inválido.', 'auth/too-many-requests':'Muitas tentativas. Tente mais tarde.' };
    showError(msgs[e.code] || 'Erro ao entrar. Tente novamente.');
  }
};

window.fazerCadastro = async function() {
  const nome = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  if (!nome || !email || !senha) return showError('Preencha todos os campos.');
  if (senha.length < 6) return showError('Senha mínimo 6 caracteres.');
  setLoading('btn-cad', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, senha);
    // salva nome temporário — role definida no wizard
    await set(ref(db, `usuarios/${cred.user.uid}/nomeTemp`), nome);
  } catch(e) {
    setLoading('btn-cad', false, 'Criar conta grátis');
    const msgs = { 'auth/email-already-in-use':'E-mail já cadastrado.', 'auth/invalid-email':'E-mail inválido.', 'auth/weak-password':'Senha muito fraca.' };
    showError(msgs[e.code] || 'Erro ao cadastrar. Tente novamente.');
  }
};

// ─── WIZARD ───
function startWizard() {
  wizardData = { step:1, tipo:null, nomeEmpresa:'', vendedores:[], socios:[], rotas:[], fornecedores:[], categorias:['Hotel','Gasolina','Diesel','Alimentação','Outros'] };
  renderWizardStep(1);
}

function renderWizardStep(step) {
  wizardData.step = step;
  // atualiza steps
  for(let i=1;i<=5;i++) {
    const el = document.getElementById('ws'+i);
    if (!el) continue;
    el.className = 'wstep' + (i<step?' done':i===step?' active':'');
  }
  const body = document.getElementById('wizard-body');
  const footer = document.getElementById('wizard-footer');

  if (step === 1) {
    body.innerHTML = `
      <div class="wizard-title">TIPO DE OPERAÇÃO</div>
      <div class="wizard-desc">Como você opera suas viagens? Isso define as funcionalidades do seu painel.</div>
      <div class="tipo-card-full ${wizardData.tipo==='investidor'?'selected':''}" onclick="window.selecionarTipo('investidor')">
        <div class="tipo-icon">💼</div>
        <div class="tipo-info">
          <div class="tipo-nome">Investidor com Sócios</div>
          <div class="tipo-desc">Você investe, os sócios operam. Acompanhe todas as viagens consolidadas.</div>
        </div>
      </div>
      <div class="tipo-card-full ${wizardData.tipo==='operador_vendedores'?'selected':''}" onclick="window.selecionarTipo('operador_vendedores')">
        <div class="tipo-icon">🚚</div>
        <div class="tipo-info">
          <div class="tipo-nome">Operador com Vendedores</div>
          <div class="tipo-desc">Você opera a viagem com equipe de vendedores em campo.</div>
        </div>
      </div>
      <div class="tipo-card-full ${wizardData.tipo==='operador_solo'?'selected':''}" onclick="window.selecionarTipo('operador_solo')">
        <div class="tipo-icon">🧍</div>
        <div class="tipo-info">
          <div class="tipo-nome">Operador Solo</div>
          <div class="tipo-desc">Você mesmo opera sem equipe de vendedores.</div>
        </div>
      </div>
    `;
    footer.innerHTML = `<button class="btn-next" onclick="window.wizardNext()" ${!wizardData.tipo?'disabled':''} id="btn-wn">Continuar</button>`;
  }

  else if (step === 2) {
    body.innerHTML = `
      <div class="wizard-title">SUA EMPRESA</div>
      <div class="wizard-desc">Como se chama sua operação?</div>
      <div class="field">
        <label>Nome da empresa</label>
        <input type="text" id="w-nome-empresa" placeholder="Ex: Renda na Porta, Grupo JK" value="${wizardData.nomeEmpresa}">
      </div>
    `;
    footer.innerHTML = `
      <button class="btn-back" onclick="window.wizardBack()">Voltar</button>
      <button class="btn-next" onclick="window.wizardNext()">Continuar</button>
    `;
  }

  else if (step === 3) {
    // Rotas
    const rotasHtml = wizardData.rotas.map((r,i) => `
      <div class="list-item">
        <div><div class="li-name">${r.nome}</div></div>
        <button class="li-del" onclick="window.removerRota(${i})">✕</button>
      </div>
    `).join('');
    body.innerHTML = `
      <div class="wizard-title">ROTAS</div>
      <div class="wizard-desc">Quais rotas/regiões você atende? (Ex: Gurupi/Palmas)</div>
      ${rotasHtml}
      <button class="btn-add" onclick="window.abrirModalRota()">+ Adicionar rota</button>
    `;
    footer.innerHTML = `
      <button class="btn-back" onclick="window.wizardBack()">Voltar</button>
      <button class="btn-next" onclick="window.wizardNext()" ${wizardData.rotas.length===0?'disabled':''}>Continuar</button>
    `;
  }

  else if (step === 4) {
    if (wizardData.tipo === 'investidor') {
      // sócios operadores
      const sociosHtml = wizardData.socios.map((s,i) => `
        <div class="list-item">
          <div>
            <div class="li-name">${s.nome}</div>
            <div class="li-sub">${s.percentual}% do lucro · ${s.login}</div>
          </div>
          <button class="li-del" onclick="window.removerSocio(${i})">✕</button>
        </div>
      `).join('');
      body.innerHTML = `
        <div class="wizard-title">SÓCIOS OPERADORES</div>
        <div class="wizard-desc">Adicione os sócios que vão operar as viagens.</div>
        ${sociosHtml}
        <button class="btn-add" onclick="window.abrirModalSocio()">+ Adicionar sócio</button>
      `;
    } else if (wizardData.tipo === 'operador_vendedores') {
      const vendHtml = wizardData.vendedores.map((v,i) => `
        <div class="list-item">
          <div>
            <div class="li-name">${v.nome}</div>
            <div class="li-sub">Meta ${v.meta}% · ${v.comissaoAlta}% / ${v.comissaoBaixa}%</div>
          </div>
          <button class="li-del" onclick="window.removerVendedor(${i})">✕</button>
        </div>
      `).join('');
      body.innerHTML = `
        <div class="wizard-title">VENDEDORES</div>
        <div class="wizard-desc">Adicione sua equipe de vendas em campo.</div>
        ${vendHtml}
        <button class="btn-add" onclick="window.abrirModalVendedor()">+ Adicionar vendedor</button>
      `;
    } else {
      // operador solo — pula para fornecedores
      wizardData.step = 4;
      body.innerHTML = `
        <div class="wizard-title">FORNECEDORES</div>
        <div class="wizard-desc">Quem são seus fornecedores de mercadoria?</div>
        ${wizardData.fornecedores.map((f,i)=>`
          <div class="list-item">
            <div class="li-name">${f}</div>
            <button class="li-del" onclick="window.removerForn(${i})">✕</button>
          </div>
        `).join('')}
        <button class="btn-add" onclick="window.abrirModalForn()">+ Adicionar fornecedor</button>
      `;
    }
    footer.innerHTML = `
      <button class="btn-back" onclick="window.wizardBack()">Voltar</button>
      <button class="btn-next" onclick="window.wizardNext()">Continuar</button>
    `;
  }

  else if (step === 5) {
    // Fornecedores (para todos exceto solo que já fez no 4)
    const fornHtml = wizardData.fornecedores.map((f,i) => `
      <div class="list-item">
        <div class="li-name">${f}</div>
        <button class="li-del" onclick="window.removerForn(${i})">✕</button>
      </div>
    `).join('');
    body.innerHTML = `
      <div class="wizard-title">FORNECEDORES</div>
      <div class="wizard-desc">Quem são seus fornecedores de mercadoria?</div>
      ${fornHtml}
      <button class="btn-add" onclick="window.abrirModalForn()">+ Adicionar fornecedor</button>
      <br>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:8px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;">✅ Tudo pronto!</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6;">
          Empresa: <b style="color:var(--text)">${wizardData.nomeEmpresa}</b><br>
          Rotas: <b style="color:var(--text)">${wizardData.rotas.length}</b><br>
          ${wizardData.tipo==='investidor'?`Sócios: <b style="color:var(--text)">${wizardData.socios.length}</b>`:wizardData.tipo==='operador_vendedores'?`Vendedores: <b style="color:var(--text)">${wizardData.vendedores.length}</b>`:'Operador Solo'}
        </div>
      </div>
    `;
    footer.innerHTML = `
      <button class="btn-back" onclick="window.wizardBack()">Voltar</button>
      <button class="btn-next" onclick="window.finalizarWizard()" id="btn-finalizar">Criar minha conta 🚀</button>
    `;
  }
}

window.selecionarTipo = function(tipo) {
  wizardData.tipo = tipo;
  renderWizardStep(1);
};

window.wizardNext = function() {
  if (wizardData.step === 1 && !wizardData.tipo) return;
  if (wizardData.step === 2) { const inp = document.getElementById("w-nome-empresa"); if (inp) wizardData.nomeEmpresa = inp.value.trim(); if (!wizardData.nomeEmpresa) { alert("Digite o nome da empresa."); return; } }
  const next = wizardData.step + 1;
  if (next <= 5) renderWizardStep(next);
};

window.wizardBack = function() {
  const prev = wizardData.step - 1;
  if (prev >= 1) renderWizardStep(prev);
};

// ─── FINALIZAR WIZARD ───
window.finalizarWizard = async function() {
  const btn = document.getElementById('btn-finalizar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Criando...';

  try {
    const uid = currentUser.uid;
    const empresaId = gerarId();
    const nomeSnap = await get(ref(db, `usuarios/${uid}/nomeTemp`));
    const nomeAdmin = nomeSnap.exists() ? nomeSnap.val() : 'Admin';

    // define role conforme tipo
    const roleMap = { investidor:'investidor', operador_vendedores:'operador', operador_solo:'operador' };
    const role = roleMap[wizardData.tipo];

    // config base
    const config = {
      nome: wizardData.nomeEmpresa,
      tipo: wizardData.tipo,
      plano: 'trial',
      nomeAdmin,
      rotas: wizardData.rotas,
      fornecedores: wizardData.fornecedores,
      despesasCategorias: wizardData.categorias,
      criadoEm: Date.now()
    };

    if (wizardData.tipo === 'operador_vendedores') {
      config.vendedores = wizardData.vendedores;
      config.regraNotaValida = 0.60; // padrão 60%
    }
    if (wizardData.tipo === 'investidor') {
      config.socios = wizardData.socios;
    }

    // salva empresa
    await set(ref(db, `empresas/${empresaId}/config`), config);

    // salva assinatura trial
    await set(ref(db, `assinaturas/${empresaId}`), {
      status: 'trial',
      plano: 'trial',
      tipo: wizardData.tipo,
      dataVencimento: Date.now() + (14 * 24 * 60 * 60 * 1000),
      criadoEm: Date.now()
    });

    // salva usuário admin
    await set(ref(db, `usuarios/${uid}`), {
      empresaId,
      nome: nomeAdmin,
      role,
      criadoEm: Date.now()
    });

    // cria contas Firebase dos sócios/vendedores em modo offline (salva credenciais para criar depois)
    if (wizardData.tipo === 'investidor' && wizardData.socios.length > 0) {
      for (const s of wizardData.socios) {
        const socioId = gerarId();
        await set(ref(db, `empresas/${empresaId}/config/sociosPendentes/${socioId}`), {
          ...s, empresaId, role: 'operador', criado: false
        });
      }
    }
    if (wizardData.tipo === 'operador_vendedores' && wizardData.vendedores.length > 0) {
      for (const v of wizardData.vendedores) {
        const vendId = gerarId();
        await set(ref(db, `empresas/${empresaId}/config/vendedoresPendentes/${vendId}`), {
          ...v, empresaId, role: 'vendedor', criado: false
        });
      }
    }

    // controle saas
    await set(ref(db, `saas_controle/empresas_status/${empresaId}`), {
      nome: wizardData.nomeEmpresa,
      plano: 'trial',
      status: 'trial',
      tipo: wizardData.tipo,
      dataVencimento: Date.now() + (14 * 24 * 60 * 60 * 1000),
      emailAdmin: currentUser.email,
      criadoEm: Date.now()
    });

    currentEmpresa = { id: empresaId, ...config };
    showScreen('app');
    renderApp({ empresaId, nome: nomeAdmin, role });

  } catch(e) {
    console.error(e);
    btn.disabled = false;
    btn.innerHTML = 'Criar minha conta 🚀';
    alert('Erro ao criar empresa. Tente novamente.');
  }
};

// ─── RENDER APP ───
function renderApp(userData) {
  const role = userData.role;
  const nome = userData.nome || userData.nomeTemp || 'Usuário';
  const empresaId = userData.empresaId;
  document.getElementById('app-user-name').textContent = nome;
  const roleNomes = { superadmin:'Super Admin', investidor:'Investidor', operador:'Operador', vendedor:'Vendedor', socioVisualizador:'Sócio Visualizador' };
  document.getElementById('app-user-role').textContent = roleNomes[role] || role;

  const body = document.getElementById('app-body');

  if (role === 'superadmin') renderSuperAdmin(body);
  else if (role === 'investidor') renderInvestidor(body, empresaId, nome, role);
  else if (role === 'operador') renderOperador(body, empresaId, nome, role);
  else if (role === 'vendedor') renderVendedor(body, empresaId, nome, role);
  else if (role === 'socioVisualizador') renderSocioVisualizador(body, empresaId, nome);
  else { showScreen('wizard'); startWizard(); }
}

        </div>

          <div class="ic-label">Ativas</div>
          <div class="ic-value" style="color:var(--verde)">${ativas}</div>
        </div>

          <div class="ic-label">Bloqueadas</div>

        </div>

    const listEl = document.getElementById('sa-empresas-list');
    if (lista.length === 0) {
      listEl.innerHTML = '<p style="color:var(--muted);font-size:13px;">Nenhuma empresa cadastrada ainda.</p>';
      return;
    }
    listEl.innerHTML = lista.map(([id, e]) => {
      const venc = e.dataVencimento ? new Date(e.dataVencimento).toLocaleDateString('pt-BR') : '—';
      const statusColor = { trial:'var(--amarelo)', ativa:'var(--verde)', bloqueada:'var(--vermelho)', cancelada:'var(--muted)' }[e.status] || 'var(--muted)';
      return `
        <div class="empresa-item">
          <div class="ei-nome">${e.nome || 'Sem nome'}</div>
          <div class="ei-info" style="margin-bottom:8px">
            Plano: ${e.plano || '—'} · Vence: ${venc}<br>
            Status: <span style="color:${statusColor};font-weight:700">${e.status}</span>
          </div>
          <div style="display:flex;gap:8px">
            ${e.status!=='bloqueada'
              ? `<button class="btn-sm btn-block" onclick="window.bloquearEmpresa('${id}')">Bloquear</button>`
              : `<button class="btn-sm btn-unblock" onclick="window.desbloquearEmpresa('${id}')">Desbloquear</button>`
            }
            <button class="btn-sm" style="background:var(--card2);border:1px solid var(--border);color:var(--text)" onclick="window.estenderTrial('${id}')">+7 dias trial</button>
          </div>
        </div>
      `;
    }).join('');
  });
}

window.bloquearEmpresa = async function(empresaId) {
  if (!confirm('Bloquear acesso desta empresa?')) return;
  await update(ref(db, `saas_controle/empresas_status/${empresaId}`), { status:'bloqueada' });
  await update(ref(db, `assinaturas/${empresaId}`), { status:'bloqueada' });
  alert('Empresa bloqueada.');
  renderSuperAdmin(document.getElementById('app-body'));
};

window.desbloquearEmpresa = async function(empresaId) {
  await update(ref(db, `saas_controle/empresas_status/${empresaId}`), { status:'ativa' });
  await update(ref(db, `assinaturas/${empresaId}`), { status:'ativa' });
  alert('Empresa desbloqueada.');
  renderSuperAdmin(document.getElementById('app-body'));
};

window.estenderTrial = async function(empresaId) {
  const snap = await get(ref(db, `assinaturas/${empresaId}/dataVencimento`));
  const atual = snap.exists() ? snap.val() : Date.now();
  const nova = atual + (7 * 24 * 60 * 60 * 1000);
  await update(ref(db, `assinaturas/${empresaId}`), { dataVencimento: nova });
  await update(ref(db, `saas_controle/empresas_status/${empresaId}`), { dataVencimento: nova });
  alert('+7 dias adicionados!');
  renderSuperAdmin(document.getElementById('app-body'));
};

window.resetarContaTeste = async function() {
  const email = currentUser?.email;
  if (email !== 'roger33242403@hotmail.com') return;
  if (!confirm('⚠️ Isso vai resetar sua conta de teste e voltar pro wizard. Confirma?')) return;

  try {
    const uid = currentUser.uid;
    // apaga SOMENTE o perfil do próprio usuário — permitido pelas regras
    // os dados de empresa ficam orphãos no Firebase (sem referência)
    await set(ref(db, `usuarios/${uid}`), null);
    // limpa estado local
    currentEmpresa = null;
    // reinicia wizard
    showScreen('wizard');
    startWizard();
  } catch(e) {
    console.error(e);
    alert('Erro ao resetar: ' + e.message);
  }
};
